# User keybinds — curated subset
$mainMod = SUPER
$scriptsDir = $HOME/.config/hypr/scripts

source = $HOME/.config/hypr/UserConfigs/01-UserDefaults.conf

# ── Core navigation ──────────────────────────────────────────────────────
bind = $mainMod, Return, exec, $term
bind = $mainMod, Q, killactive
bind = $mainMod, F, fullscreen, 1
bind = $mainMod SHIFT, F, fullscreen
bind = $mainMod, SPACE, togglefloating
bind = $mainMod, D, global, quickshell:appSearch
bind = $mainMod, A, global, quickshell:overviewToggle
bind = $mainMod, N, global, quickshell:notificationCenter
bind = $mainMod, H, global, quickshell:helpMenu
bind = $mainMod, comma, global, quickshell:settings
bind = $mainMod, W, global, quickshell:wallpaperPicker
bind = $mainMod SHIFT, P, exec, $scriptsDir/tuned.sh cycle
bind = $mainMod ALT, E, global, quickshell:emojiPicker
bind = $mainMod ALT, C, global, quickshell:calculator

# ── Workspaces ────────────────────────────────────────────────────────────
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
bind = $mainMod, Tab, focuscurrentorlast

# ── Windows ───────────────────────────────────────────────────────────────
bind = $mainMod, h, movefocus, l
bind = $mainMod, j, movefocus, d
bind = $mainMod, k, movefocus, u
bind = $mainMod, l, movefocus, r
bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, j, movewindow, d
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, l, movewindow, r

# ── Curated extras ────────────────────────────────────────────────────────
bind = $mainMod, E, exec, $files                       # file manager
bind = $mainMod, B, exec, xdg-open "https://"          # browser
bind = $mainMod, Z, exec, zeditor                      # zed editor
bind = $mainMod SHIFT, Return, exec, $scriptsDir/Dropterminal.sh $term
bind = $mainMod, S, global, quickshell:appSearch       # search (same as launcher)
bind = $mainMod ALT, V, exec, cliphist list | fzf --reverse --prompt="Clipboard: " | cliphist decode | wl-copy
bind = $mainMod ALT, L, exec, $scriptsDir/ChangeLayout.sh
bind = $mainMod ALT, O, exec, $scriptsDir/ChangeBlur.sh
bind = $mainMod ALT, R, exec, $scriptsDir/Refresh.sh
bind = $mainMod ALT, N, exec, $scriptsDir/Hyprsunset.sh toggle  # nightlight
bind = $mainMod SHIFT, G, exec, $scriptsDir/GameMode.sh         # toggle animations
bind = $mainMod SHIFT, A, exec, $scriptsDir/Animations.sh       # animations menu
bind = $mainMod SHIFT, W, exec, $scriptsDir/WallpaperEffects.sh
bind = CTRL ALT, W, exec, $scriptsDir/WallpaperRandom.sh
bind = $mainMod SHIFT, O, exec, $scriptsDir/ZshChangeTheme.sh
bind = $mainMod CTRL, O, exec, hyprctl setprop active opaque toggle
bindln = ALT_L, SHIFT_L, exec, $scriptsDir/SwitchKeyboardLayout.sh
bindln = SHIFT_L, ALT_L, exec, $scriptsDir/Tak0-Per-Window-Switch.sh

# Move workspaces between monitors
bind = $mainMod CTRL, F9, movecurrentworkspacetomonitor, l
bind = $mainMod CTRL, F10, movecurrentworkspacetomonitor, r
bind = $mainMod CTRL, F11, movecurrentworkspacetomonitor, u
bind = $mainMod CTRL, F12, movecurrentworkspacetomonitor, d

# ── Media & Volume ────────────────────────────────────────────────────────
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous
bind = , XF86MonBrightnessUp, exec, brightnessctl s 5%+
bind = , XF86MonBrightnessDown, exec, brightnessctl s 5%-
bind = , Print, exec, grim -g "$(slurp)" - | satty -f -
