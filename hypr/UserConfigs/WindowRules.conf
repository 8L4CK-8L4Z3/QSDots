# Window rules and layer rules

# Tag classes
windowrule = match:class ^([Ff]irefox|zen|zen-alpha)$, tag +browser
windowrule = match:class ^([Gg]oogle-chrome|[Cc]hromium|Brave-browser)$, tag +browser
windowrule = match:class ^(swaync-control-center|swaync-notification-window)$, tag +notif
windowrule = match:class ^(Alacritty|kitty|ghostty)$, tag +terminal
windowrule = match:class ^(code|zed)$, tag +projects
windowrule = match:class ^(nwg-displays|nwg-look)$, tag +settings
windowrule = match:class ^([Tt]hunar|nemo)$, tag +file-manager
windowrule = match:class ^([Ss]team)$, tag +gamestore
windowrule = match:class ^([Mm]pv|vlc)$, tag +multimedia_video

# Floating windows
windowrule = match:tag settings, float on
windowrule = match:tag file-manager, float on, size (monitor_w*0.7) (monitor_h*0.6)
windowrule = match:class ^(pavucontrol)$, float on, center on
windowrule = match:class ^(nm-connection-editor|blueman-manager)$, float on

# Center some popups
windowrule = match:title ^(Authentication Required)$, float on, center on
windowrule = match:title ^(Picture-in-Picture)$, float on, pin on, keep_aspect_ratio on, move 72% 7%

# Avoid idle for fullscreen apps
windowrule = match:fullscreen true, idle_inhibit fullscreen

# Video/media
windowrule = match:tag multimedia_video, no_blur on
windowrule = match:tag multimedia_video, opacity 1.0

# Opacity
windowrule = match:tag browser, opacity 0.99 0.8
windowrule = match:tag terminal, opacity 0.9 0.7

# Layer rules
layerrule = namespace quickshell:overview, blur on
layerrule = namespace quickshell:overview, ignore_alpha 0.5
